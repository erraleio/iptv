name: IPTV Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install ffmpeg
        run: sudo apt-get install ffmpeg -y

      - name: Check IPTV
        run: |
          mkdir output
          while read line
          do
            if [[ $line == http* ]]; then
              timeout 10 ffmpeg -i "$line" -t 5 -f null - 2>/dev/null
              if [ $? -eq 0 ]; then
                echo $line >> output/live.txt
              fi
            fi
          done < tv/iptv4.txt

      - name: Commit result
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@github.com"
          git add output/live.txt
          git commit -m "update live channels" || echo "no changes"
          git push
